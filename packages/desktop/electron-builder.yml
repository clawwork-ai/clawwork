appId: com.clawwork.app
productName: ClawWork
buildVersion: "${env.BUILD_VERSION}"
directories:
  buildResources: build
  output: dist
files:
  - "out/**/*"
  - "node_modules/**/*"
  - "package.json"
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
        - universal
    - target: zip
      arch:
        - x64
        - arm64
        - universal
  category: public.app-category.developer-tools
  identity: null
  icon: build/icon.icns
dmg:
  writeUpdateInfo: false
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
